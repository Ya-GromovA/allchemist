services:
  synapse-db:
    image: postgres:16
    container_name: synapse-db
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse_password}
      TZ: ${TZ:-Europe/Moscow}
      PGTZ: ${PGTZ:-Europe/Moscow}
    ports:
      - "5433:5432"
    volumes:
      - synapse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  synapse-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: synapse-backend
    restart: unless-stopped
    depends_on:
      synapse-db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: synapse-db
      POSTGRES_PORT: 5432
      TZ: ${TZ:-Europe/Moscow}
      HOST: 0.0.0.0
      PORT: 8000

      # AI
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-llama3-8b-8192}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.2}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-900}

      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b-instruct-q4_0}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
      OLLAMA_MAX_TOKENS: ${OLLAMA_MAX_TOKENS:-900}

      # Content packs import
      CONTENT_PACKS_DIR: /content_packs
      CONTENT_SEED_TOKEN: ${CONTENT_SEED_TOKEN:-}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "8000:8000"

    volumes:
      - /root/synapse/content_packs:/content_packs:ro
      - /root/synapse/backend/data:/app/data

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen(\'http://127.0.0.1:8000/api/v1/health\', timeout=2).read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  synapse_pg_data:
